services:
  - type: web
    name: blog-app
    env: php
    plan: free
    buildCommand: |
      composer install --no-interaction --prefer-dist
      npm install
      npm run build
      php artisan optimize
      php artisan migrate --force
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
